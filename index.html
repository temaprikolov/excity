<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ЭКСКРЕМЕНТ СИТИ — 20.04.26 — 00:00 МСК</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #060606;
    --dark: #0e0e0e;
    --red: #cc1111;
    --orange: #ff4500;
    --brown: #8B5A2B;
    --cream: #d8cfc0;
    --dim: #6b6058;
    --mono: 'Share Tech Mono', monospace;
    --display: 'VT323', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--black);
    color: var(--cream);
    font-family: var(--mono);
    overflow-x: hidden;
    cursor: crosshair;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  /* NOISE OVERLAY */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
    opacity: 0.035;
    pointer-events: none;
    z-index: 9999;
  }

  /* SCANLINES */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.08) 2px,
      rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
    z-index: 9998;
  }

  /* GLITCH KEYFRAMES */
  @keyframes glitch {
    0%, 100% { clip-path: none; transform: none; }
    20% { clip-path: inset(30% 0 50% 0); transform: translate(-3px, 0); }
    40% { clip-path: inset(70% 0 10% 0); transform: translate(3px, 0); }
    60% { clip-path: none; transform: none; }
    80% { clip-path: inset(10% 0 80% 0); transform: translate(-2px, 0); color: var(--orange); }
  }

  @keyframes flicker {
    0%, 100% { opacity: 1; }
    92% { opacity: 1; }
    93% { opacity: 0.6; }
    94% { opacity: 1; }
    96% { opacity: 0.3; }
    97% { opacity: 1; }
  }

  @keyframes pulse-red {
    0%, 100% { box-shadow: 0 0 0px var(--red); }
    50% { box-shadow: 0 0 20px var(--red), 0 0 40px rgba(200,0,0,0.3); }
  }

  @keyframes countdown-tick {
    0% { color: var(--cream); }
    50% { color: var(--red); }
    100% { color: var(--cream); }
  }

  @keyframes btn-pulse {
    0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(204, 17, 17, 0.7); }
    70% { transform: scale(1.02); box-shadow: 0 0 0 15px rgba(204, 17, 17, 0); }
    100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(204, 17, 17, 0); }
  }

  /* MAIN CONTAINER */
  .container {
    max-width: 640px;
    width: 100%;
    padding: 40px 20px;
    text-align: center;
    position: relative;
    z-index: 1;
  }

  .warning-strip {
    font-family: var(--display);
    font-size: 13px;
    letter-spacing: 6px;
    color: var(--red);
    text-transform: uppercase;
    margin-bottom: 30px;
    animation: flicker 8s infinite;
  }

  .warning-strip::before {
    content: "💩 ";
    letter-spacing: 0;
  }
  .warning-strip::after {
    content: " 💩";
    letter-spacing: 0;
  }

  /* COVER */
  .cover-wrap {
    position: relative;
    display: inline-block;
    margin: 0 auto;
  }

  .cover-img {
    width: min(400px, 80vw);
    height: min(400px, 80vw);
    object-fit: cover;
    display: block;
    filter: contrast(1.1) saturate(0.85) sepia(0.1);
    border: 1px solid #1a1a1a;
    position: relative;
    z-index: 1;
    margin: 0 auto;
  }

  .cover-img:hover {
    animation: glitch 0.4s steps(2) infinite;
  }

  .cover-corner {
    position: absolute;
    font-family: var(--display);
    font-size: 11px;
    color: var(--dim);
    letter-spacing: 2px;
    z-index: 2;
  }
  .cover-corner.tl { top: 8px; left: 8px; }
  .cover-corner.tr { top: 8px; right: 8px; }
  .cover-corner.bl { bottom: 8px; left: 8px; }
  .cover-corner.br { bottom: 8px; right: 8px; }

  /* TITLE */
  .album-title {
    font-family: var(--display);
    font-size: clamp(42px, 9vw, 82px);
    letter-spacing: 8px;
    color: var(--cream);
    margin-top: 30px;
    line-height: 1;
    text-transform: uppercase;
    position: relative;
  }

  .album-title::after {
    content: attr(data-text);
    position: absolute;
    inset: 0;
    color: var(--red);
    clip-path: inset(45% 0 45% 0);
    transform: translate(3px, 0);
    opacity: 0.7;
    animation: glitch 7s steps(2) infinite;
  }

  .artists-line {
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 5px;
    color: var(--dim);
    text-transform: uppercase;
    margin-top: 12px;
    margin-bottom: 8px;
  }

  /* COUNTDOWN */
  .drop-block {
    margin: 40px auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  .drop-label {
    font-family: var(--display);
    font-size: 12px;
    letter-spacing: 6px;
    color: var(--dim);
    text-transform: uppercase;
  }

  .countdown-wrap {
    display: flex;
    gap: 4px;
    align-items: baseline;
    flex-wrap: wrap;
    justify-content: center;
  }

  .countdown-unit {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .countdown-num {
    font-family: var(--display);
    font-size: clamp(36px, 8vw, 64px);
    color: var(--cream);
    line-height: 1;
    min-width: 2ch;
    text-align: center;
    animation: countdown-tick 1s step-end infinite;
  }

  .countdown-label {
    font-family: var(--mono);
    font-size: 9px;
    color: var(--dim);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 2px;
  }

  .countdown-sep {
    font-family: var(--display);
    font-size: 48px;
    color: var(--red);
    line-height: 1;
    margin-bottom: 16px;
    animation: flicker 2s infinite;
  }

  .dropped-msg {
    font-family: var(--display);
    font-size: 42px;
    color: var(--red);
    letter-spacing: 6px;
    animation: pulse-red 1.5s infinite;
  }

  .dropped-msg::before {
    content: "💩 ";
    font-size: 42px;
  }
  .dropped-msg::after {
    content: " 💩";
    font-size: 42px;
  }

  .msk-badge {
    font-family: var(--display);
    font-size: 10px;
    color: var(--dim);
    letter-spacing: 3px;
    margin-top: 12px;
    text-transform: uppercase;
  }

  .msk-badge::before {
    content: "🕒 ";
    color: var(--red);
  }

  /* DIVIDER */
  .divider {
    width: 100%;
    max-width: 400px;
    margin: 20px auto;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--red), transparent);
    opacity: 0.4;
  }

  /* BIG LISTEN BUTTON */
  .listen-btn {
    display: inline-block;
    margin: 20px auto 30px;
    padding: 18px 42px;
    background: transparent;
    border: 2px solid var(--red);
    color: var(--red);
    font-family: var(--display);
    font-size: 28px;
    letter-spacing: 8px;
    text-transform: uppercase;
    text-decoration: none;
    cursor: pointer;
    transition: all 0.3s ease;
    animation: btn-pulse 2s infinite;
    position: relative;
    overflow: hidden;
  }

  .listen-btn::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: var(--red);
    transition: left 0.3s ease;
    z-index: -1;
  }

  .listen-btn:hover {
    color: var(--black);
    border-color: var(--red);
  }

  .listen-btn:hover::before {
    left: 0;
  }

  .listen-btn:active {
    transform: scale(0.98);
  }

  /* BOTTOM SECTION */
  .bottom-section {
    text-align: center;
    margin-top: 20px;
  }

  .links-row {
    display: flex;
    justify-content: center;
    gap: 24px;
    margin-top: 20px;
    flex-wrap: wrap;
  }

  .tg-link {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--dim);
    text-decoration: none;
    text-transform: uppercase;
    border: 1px solid #1e1e1e;
    padding: 10px 18px;
    transition: all 0.2s;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    position: relative;
  }

  .tg-link:hover {
    color: var(--cream);
    border-color: var(--red);
    background: rgba(200,17,17,0.05);
  }

  .tg-link::before {
    content: '💩';
    font-size: 11px;
    color: var(--red);
  }

  .footer-line {
    margin-top: 40px;
    font-family: var(--display);
    font-size: 10px;
    letter-spacing: 5px;
    color: #2a2a2a;
    text-transform: uppercase;
  }

  @media (max-width: 500px) {
    .container { padding: 20px 16px; }
    .links-row { flex-direction: column; align-items: center; }
    .tg-link { width: 80%; justify-content: center; }
    .listen-btn { font-size: 20px; letter-spacing: 4px; padding: 14px 24px; }
    .countdown-sep { font-size: 32px; margin-bottom: 8px; }
  }
</style>
</head>
<body>

<div class="container">
  <div class="warning-strip">ЭКСКРЕМЕНЦИЯ!!!</div>

  <div class="cover-wrap">
    <img class="cover-img" id="coverImg" src="cover.jpg" alt="ЭКСКРЕМЕНТ СИТИ"
         onerror="this.style.display='none'; document.getElementById('coverFallback').style.display='flex';">
    <div id="coverFallback" style="display:none;width:min(400px,80vw);height:min(400px,80vw);background:#0e0e0e;border:1px solid #1a1a1a;align-items:center;justify-content:center;font-family:var(--display);font-size:48px;color:#1a1a1a;letter-spacing:4px;margin:0 auto;">💩 COVER 💩</div>
    <span class="cover-corner tl">ЭКСК</span>
    <span class="cover-corner tr">CITY</span>
    <span class="cover-corner bl">2026</span>
    <span class="cover-corner br">LP-01</span>
  </div>

  <h1 class="album-title" data-text="ЭКСКРЕМЕНТ СИТИ">ЭКСКРЕМЕНТ СИТИ</h1>
  <div class="artists-line">temaprikolov &amp; MC ZLO</div>

  <div class="drop-block">
    <div class="drop-label">ДРОП ЧЕРЕЗ</div>
    <div id="countdown" class="countdown-wrap">
      <div class="countdown-unit">
        <span class="countdown-num" id="cd-d">00</span>
        <span class="countdown-label">дней</span>
      </div>
      <div class="countdown-sep">:</div>
      <div class="countdown-unit">
        <span class="countdown-num" id="cd-h">00</span>
        <span class="countdown-label">часов</span>
      </div>
      <div class="countdown-sep">:</div>
      <div class="countdown-unit">
        <span class="countdown-num" id="cd-m">00</span>
        <span class="countdown-label">минут</span>
      </div>
      <div class="countdown-sep">:</div>
      <div class="countdown-unit">
        <span class="countdown-num" id="cd-s">00</span>
        <span class="countdown-label">секунд</span>
      </div>
    </div>
    <div class="msk-badge">МОСКВА 00:00</div>
  </div>

  <div class="divider"></div>

  <!-- БОЛЬШАЯ КНОПКА СЛУШАТЬ -->
  <a href="https://soundcloud.com/temaprikolov93/sets/ekskrementcity" 
     class="listen-btn" 
     target="_blank"
     rel="noopener noreferrer">
    🎧 СЛУШАТЬ
  </a>

  <div class="divider"></div>

  <div class="bottom-section">
    <div class="links-row">
      <a class="tg-link" href="https://t.me/temaprikolov2" target="_blank" rel="noopener noreferrer">temaprikolov</a>
      <a class="tg-link" href="https://t.me/mczloO" target="_blank" rel="noopener noreferrer">MC ZLO</a>
    </div>
    <div class="footer-line">ЭКСКРЕМЕНТ СИТИ © 2026 / temaprikolov &amp; MC ZLO</div>
  </div>
</div>

<script>
// ========== COUNTDOWN — 00:00 МСК ==========
// 20 апреля 2026 года, 00:00 по московскому времени (UTC+3)
const DROP_DATE = new Date(Date.UTC(2026, 3, 19, 21, 0, 0));
// 20 апреля 00:00 МСК = 19 апреля 21:00 UTC

function updateCountdown() {
  const now = new Date();
  const diff = DROP_DATE - now;

  if (diff <= 0) {
    const countdownEl = document.getElementById('countdown');
    countdownEl.innerHTML = '<div class="dropped-msg">УЖЕ ВЫШЕЛ</div>';
    return;
  }

  const d = Math.floor(diff / 86400000);
  const h = Math.floor((diff % 86400000) / 3600000);
  const m = Math.floor((diff % 3600000) / 60000);
  const s = Math.floor((diff % 60000) / 1000);

  document.getElementById('cd-d').textContent = String(d).padStart(2,'0');
  document.getElementById('cd-h').textContent = String(h).padStart(2,'0');
  document.getElementById('cd-m').textContent = String(m).padStart(2,'0');
  document.getElementById('cd-s').textContent = String(s).padStart(2,'0');
}

updateCountdown();
setInterval(updateCountdown, 1000);
</script>
</body>
</html>
